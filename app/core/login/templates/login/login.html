{% extends 'login/base.html' %}
{% load static %}
{% load widget_tweaks %}
{% block head_login %}
  <script src="{% static 'login/js/login.js' %}"></script>
{% endblock %}
{% block content %}
  <div class="login-box">
    <div class="login-box-body">
      <div class="card">
        <div class="card-body login-card-body">
          <!-- ICONO -->
          <div class="contact-image">
            <i class="{{ dshboard.get_icon }} fa-4x"></i>
          </div>

          <!-- TÍTULO -->
          <p class="login-box-msg">Inicio de Sesión</p>

          <!-- FORMULARIO -->
          <form method="post" id="frmLogin">
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ next }}" />

            <div class="form-group mb-3">
              <label>Usuario:</label>
              {{ form.username }}
            </div>

            <div class="form-group mb-3">
              <label>Contraseña:</label>
              <div class="input-group my-group">
                {{ form.password }}
                <div class="input-group-append">
                  <button class="btn btn-danger btnShowPassword btn-flat" type="button"><i class="fas fa-eye"></i></button>
                </div>
              </div>
            </div>

            <button type="submit" class="btn btn-danger btn-block btn-flat w-100"><i class="fas fa-sign-in-alt"></i> Ingresar</button>
          </form>

          <!-- RECUPERAR CONTRASEÑA -->
          <p class="mt-3 text-center desc">
            <a href="{% url 'reset_password' %}">Reestablecer contraseña <i class="fas fa-key"></i></a>
          </p>

          <!-- FIRMA CORPORATIVA -->
          <p class="text-center mt-4 brand-signature">xO Soluciones Informáticas</p>
        </div>
      </div>
    </div>
  </div>

  <!-- ERRORES -->
  <script type="application/javascript">
        var errors = "";
        {% if form.errors %}
            {% for field in form %}
                {% for error in field.errors %}
                    errors += "{{ error }}\n";
                {% endfor %}
            {% endfor %}
            {% for error in form.non_field_errors %}
                errors += "{{ error }}\n";
            {% endfor %}
            Swal.fire({
                icon: 'error',
                title: 'Notificación',
                text: errors,
            });
        {% endif %}
    </script>
{% endblock %}
